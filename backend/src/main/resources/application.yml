server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  datasource:
    url: ${APP_DATABASE_URL:jdbc:h2:file:./data/resume-tailor}
    username: ${APP_DATABASE_USER:sa}
    password: ${APP_DATABASE_PASSWORD:}
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

app:
  cors-origins: "http://localhost:5173,http://127.0.0.1:5173"
  security:
    api-key-enabled: ${APP_API_KEY_ENABLED:false}
    api-key: ${APP_API_KEY:}
    beta-access-enabled: ${APP_BETA_ACCESS_ENABLED:false}
    beta-users: ${APP_BETA_USERS:}
    rate-limit-per-minute: ${APP_RATE_LIMIT_PER_MINUTE:30}
    tailor-rate-limit-per-hour: ${APP_TAILOR_LIMIT_PER_HOUR:10}
    tailor-rate-limit-per-month: ${APP_TAILOR_LIMIT_PER_MONTH:30}
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    require-api-key: true
    json-response-format: true
    timeout-seconds: 120
    max-completion-tokens: ${OPENAI_MAX_COMPLETION_TOKENS:8192}
    extract-model: ${OPENAI_EXTRACT_MODEL:}
    extract-max-completion-tokens: ${OPENAI_EXTRACT_MAX_COMPLETION_TOKENS:3072}
    fallback:
      enabled: ${LLM_FALLBACK_ENABLED:false}
      base-url: ${LLM_FALLBACK_BASE_URL:}
      api-key: ${LLM_FALLBACK_API_KEY:}
      model: ${LLM_FALLBACK_MODEL:}
      max-completion-tokens: ${LLM_FALLBACK_MAX_COMPLETION_TOKENS:8192}
      json-response-format: ${LLM_FALLBACK_JSON_FORMAT:true}
      timeout-seconds: ${LLM_FALLBACK_TIMEOUT_SECONDS:180}
  llm-limits:
    max-resume-chars: ${LLM_MAX_RESUME_CHARS:12000}
    max-jd-chars: ${LLM_MAX_JD_CHARS:5000}
    max-structured-json-chars: ${LLM_MAX_STRUCTURED_JSON_CHARS:9000}
    max-resume-chars-fallback: ${LLM_MAX_RESUME_CHARS_FALLBACK:7000}
    prefer-fallback-over-chars: ${LLM_PREFER_FALLBACK_OVER_CHARS:9000}
    pause-ms-between-llm-calls: ${LLM_PAUSE_MS:0}
  features:
    interview-questions: ${GENERATE_INTERVIEW_QUESTIONS:true}
