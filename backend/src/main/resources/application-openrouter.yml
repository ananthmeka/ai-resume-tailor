# OpenRouter — many models including low-cost / free variants
# https://openrouter.ai/keys

spring:
  config:
    activate:
      on-profile: openrouter

app:
  cors-origins: ${APP_CORS_ORIGINS:http://localhost:5173}
  openai:
    api-key: ${OPENROUTER_API_KEY:${OPENAI_API_KEY:}}
    base-url: ${OPENAI_BASE_URL:https://openrouter.ai/api/v1}
    model: ${OPENAI_MODEL:meta-llama/llama-3.3-70b-instruct:free}
    require-api-key: true
    json-response-format: true
    timeout-seconds: 180
