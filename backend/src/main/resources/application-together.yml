# Together AI — open models with free starter credits
# https://api.together.xyz/

spring:
  config:
    activate:
      on-profile: together

app:
  cors-origins: ${APP_CORS_ORIGINS:http://localhost:5173}
  openai:
    api-key: ${TOGETHER_API_KEY:${OPENAI_API_KEY:}}
    base-url: ${OPENAI_BASE_URL:https://api.together.xyz/v1}
    model: ${OPENAI_MODEL:meta-llama/Llama-3.3-70B-Instruct-Turbo}
    require-api-key: true
    json-response-format: true
    timeout-seconds: 180
